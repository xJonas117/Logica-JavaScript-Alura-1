    var altura = parseInt(prompt("Qual sua altura?"));
    var peso = parseInt(prompt("Qual seu peso?"));

    if(imc < 18.5){
        mostra("O seu imc está abaixo do seu peso ideal");
    }
    if(imc > 25){
        mostra("Você está acima do peso ideal");
