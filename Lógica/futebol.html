<meta charset="UTF-8">

<script>
	
	function pulaLinha() {

		document.write("<br><br>");
	}

	function mostra(frase) {

		document.write(frase);
		pulaLinha();
	}

var vitorias = 3;
var empates = 1;

var vitorias = parseInt(prompt("Escreva o numero de vitorias"));
var empates = parseInt(prompt("Escreva o numero de empates"));

var total = vitorias*3 + empates;
var totalAnoPassado = 45;

if(total < totalAnoPassado){
    mostra("Seu time foi pior");
}
if(total > totalAnoPassado){
    mostra("Seu time foi melhor");
}
if(total == totalAnoPassado){
    mostra("Seu time foi igual ano passado");
}
mostra("FIM");

</script>
